<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn and site.data.google_scholar_stats.commit %}
        var gsDataUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@{{ site.data.google_scholar_stats.commit }}/gs_data.json'
        var gsDataFallbackUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json'
        {% else %}
        var gsDataUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json'
        {% endif %}

        function renderCitations(data) {
            var totalCitation = data['citedby']
            var totalCitEl = document.getElementById('total_cit');
            if (totalCitEl) totalCitEl.innerHTML = ' ' + totalCitation;
            var citationEles = document.getElementsByClassName('show_paper_citations')
            Array.prototype.forEach.call(citationEles, element => {
                var paperId = element.getAttribute('data')
                var numCitations = data['publications'][paperId]['num_citations']
                element.innerHTML = '| Citations: ' + numCitations;
            });
        }

        $.getJSON(gsDataUrl, renderCitations).fail(function () {
            if (typeof gsDataFallbackUrl !== 'undefined') {
                $.getJSON(gsDataFallbackUrl, renderCitations);
            }
        });
    })
</script>
