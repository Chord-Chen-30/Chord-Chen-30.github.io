name: Get Citation Data

on:
  push:
    branches:
      - master
    paths-ignore:
      - '_data/google_scholar_stats.json'
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install Reqs
      run: |
        sudo apt-get install python3-setuptools
    - name: Run
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py
        cd ./results
        git init
        git config --local user.name "${GITHUB_ACTOR}"
        export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
        git add *.json
        git commit -m "Updated Citation Data"
        git push "${remote_repo}" HEAD:google-scholar-stats --force
        echo "GS_STATS_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
    - name: Update CDN commit pointer
      run: |
        printf '{\n  "commit": "%s"\n}\n' "$GS_STATS_COMMIT" > _data/google_scholar_stats.json
        git config --local user.name "${GITHUB_ACTOR}"
        git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
        git add _data/google_scholar_stats.json
        git diff --staged --quiet || git commit -m "Update Google Scholar stats CDN commit pointer"
        git push
    - name: Purge jsDelivr CDN cache
      run: |
        curl -fsS "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@google-scholar-stats/gs_data.json"
        curl -fsS "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@google-scholar-stats/gs_data_shieldsio.json"